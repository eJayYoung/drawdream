version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: huimeng-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: huimeng
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and job queue
  redis:
    image: redis:7-alpine
    container_name: huimeng-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: huimeng-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: huimeng-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  # API Service (NestJS)
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: huimeng-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: huimeng
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-huimeng-production-secret-change-me}
      JWT_EXPIRES_IN: 7d
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: huimeng
      COMFYUI_HOST: comfyui
      COMFYUI_PORT: 8188
      CORS_ORIGIN: http://localhost
    ports:
      - "8778:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # Web (Next.js)
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: huimeng-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8778
      NEXT_PUBLIC_WS_URL: ws://localhost:8778
    ports:
      - "8777:3000"
    restart: unless-stopped

  # ComfyUI Service
  comfyui:
    build:
      context: ../services/comfyui
      dockerfile: Dockerfile
    container_name: huimeng-comfyui
    ports:
      - "3000-3007:8188"
    volumes:
      - comfyui_models:/app/models
      - comfyui_output:/app/output
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  comfyui_models:
  comfyui_output:
