<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle with Dreamy Effect -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#glow)"/>

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Dream Cloud Left -->
  <g transform="translate(100, 160)">
    <ellipse cx="60" cy="50" rx="50" ry="35" fill="#fff" fill-opacity="0.9"/>
    <ellipse cx="30" cy="60" rx="35" ry="25" fill="#fff" fill-opacity="0.9"/>
    <ellipse cx="90" cy="65" rx="40" ry="28" fill="#fff" fill-opacity="0.9"/>
  </g>

  <!-- Dream Cloud Right -->
  <g transform="translate(280, 140)">
    <ellipse cx="50" cy="45" rx="45" ry="32" fill="#fff" fill-opacity="0.8"/>
    <ellipse cx="25" cy="55" rx="30" ry="22" fill="#fff" fill-opacity="0.8"/>
    <ellipse cx="75" cy="58" rx="35" ry="25" fill="#fff" fill-opacity="0.8"/>
  </g>

  <!-- Magic Brush/Pencil -->
  <g transform="translate(180, 200) rotate(-45)">
    <!-- Brush Body -->
    <rect x="0" y="0" width="160" height="35" rx="8" fill="url(#pencilGrad)"/>
    <!-- Brush Tip -->
    <polygon points="160,0 200,17.5 160,35" fill="#f093fb"/>
    <!-- Brush Handle -->
    <rect x="-20" y="5" width="25" height="25" rx="5" fill="#2d1a4a"/>
    <!-- Brush Detail Lines -->
    <line x1="40" y1="0" x2="40" y2="35" stroke="#fff" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="80" y1="0" x2="80" y2="35" stroke="#fff" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="120" y1="0" x2="120" y2="35" stroke="#fff" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fff">
    <polygon points="420,100 425,115 440,115 428,125 433,140 420,130 407,140 412,125 400,115 415,115" opacity="0.9"/>
    <polygon points="80,300 83,310 93,310 85,317 88,327 80,320 72,327 75,317 67,310 77,310" opacity="0.8"/>
    <polygon points="440,350 443,358 451,358 445,364 448,372 440,367 432,372 435,364 429,358 437,358" opacity="0.7"/>
    <circle cx="100" cy="120" r="4" opacity="0.6"/>
    <circle cx="400" cy="280" r="3" opacity="0.5"/>
    <circle cx="380" cy="400" r="5" opacity="0.7"/>
  </g>

  <!-- Chinese Character 绘 (subtle, integrated) -->
  <text x="256" y="380" font-family="serif" font-size="60" fill="#fff" fill-opacity="0.15" text-anchor="middle" font-weight="bold">绘</text>

  <!-- Bottom Text -->
  <text x="256" y="460" font-family="system-ui, sans-serif" font-size="32" fill="#fff" fill-opacity="0.95" text-anchor="middle" font-weight="300" letter-spacing="8">绘梦</text>
</svg>